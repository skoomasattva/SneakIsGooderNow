name: Upload to Nexus Mods

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number'
        required: true
      description:
        description: 'File description (changelog)'
        required: false
        default: ''

jobs:
  upload-to-nexusmods:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Zip mod files
        run: zip -r SneakIsGoodNow.zip scripts/ SneakIsGoodNow.omwaddon SneakIsGoodNow.omwscripts

      - name: Upload mod to NexusMods
        uses: Nexus-Mods/upload-action@main
        with:
          api_key: ${{ secrets.NEXUSMODS_API_KEY }}
          file_group_id: ${{ vars.NEXUSMODS_FILE_GROUP_ID }}
          filename: SneakIsGoodNow.zip
          display_name: "Sneak Is Good Now"
          description: ${{ github.event.release.body || github.event.inputs.description }}
          version: ${{ github.event.release.tag_name || github.event.inputs.version }}
